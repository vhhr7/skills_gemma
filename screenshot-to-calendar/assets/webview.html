<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Evento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f2f4f8;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header .icon {
      font-size: 28px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .header p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 14px 0;
    }

    .field {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .field .emoji {
      font-size: 16px;
      margin-top: 1px;
      flex-shrink: 0;
    }

    .field-content {
      display: flex;
      flex-direction: column;
    }

    .field-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .field-value {
      font-size: 14px;
      color: #222;
      font-weight: 500;
      line-height: 1.4;
    }

    .field-value.title {
      font-size: 16px;
      font-weight: 700;
    }

    .field-value.empty {
      color: #bbb;
      font-weight: 400;
      font-style: italic;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: #4285F4;
      color: white;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-icon { font-size: 18px; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="icon">📅</span>
    <div>
      <h1>Nuevo Evento</h1>
      <p>Calendario: familia</p>
    </div>
  </div>

  <hr class="divider">

  <div class="field">
    <span class="emoji">📌</span>
    <div class="field-content">
      <span class="field-label">Título</span>
      <span class="field-value title" id="title">—</span>
    </div>
  </div>

  <div class="field">
    <span class="emoji">🕐</span>
    <div class="field-content">
      <span class="field-label">Inicio</span>
      <span class="field-value" id="start">—</span>
    </div>
  </div>

  <div class="field">
    <span class="emoji">🕔</span>
    <div class="field-content">
      <span class="field-label">Fin</span>
      <span class="field-value" id="end">—</span>
    </div>
  </div>

  <div class="field" id="location-row">
    <span class="emoji">📍</span>
    <div class="field-content">
      <span class="field-label">Lugar</span>
      <span class="field-value" id="location">—</span>
    </div>
  </div>

  <div class="field" id="description-row">
    <span class="emoji">📝</span>
    <div class="field-content">
      <span class="field-label">Notas</span>
      <span class="field-value" id="description">—</span>
    </div>
  </div>

  <div class="buttons">
    <a id="gcal-btn" class="btn btn-primary" href="#" target="_blank">
      <span class="btn-icon">📅</span>
      Agregar a Google Calendar
    </a>
    <button id="ics-btn" class="btn btn-secondary" onclick="downloadICS()">
      <span class="btn-icon">🍎</span>
      Descargar .ics (Apple Calendar)
    </button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  function setField(id, value, emptyText) {
    const el = document.getElementById(id);
    if (!value || value.trim() === "") {
      el.textContent = emptyText || "—";
      el.classList.add("empty");
    } else {
      el.textContent = value;
    }
  }

  setField("title",       params.get("title"),       "Sin título");
  setField("start",       params.get("start"),       "No especificado");
  setField("end",         params.get("end"),         "No especificado");
  setField("location",    params.get("location"),    "No especificado");
  setField("description", params.get("description"), "Sin notas");

  // Set Google Calendar button URL
  const gcalUrl = params.get("gcalUrl");
  if (gcalUrl) {
    document.getElementById("gcal-btn").href = gcalUrl;
  }

  // Download ICS for Apple Calendar
  function downloadICS() {
    const base64 = params.get("icsBase64");
    if (!base64) return;
    try {
      const icsContent = decodeURIComponent(escape(atob(base64)));
      const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "evento.ics";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      alert("Error generando el archivo .ics: " + e.message);
    }
  }
</script>
</body>
</html>
